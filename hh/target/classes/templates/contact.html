<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>contact</title>
</head>
<body>
<h1>This contact page</h1>
<form>
    <label>Name</label><br>
    <input type="text" name="name" required  oninvalid="this.setCustomValidity('Please enter a valid Name')"><br><br>
    <label>Email</label><br>
    <input type="email" name="email" required="false"><br><br>
    <label>Message</label><br>
    <textarea name="message"></textarea><br><br>
    <button type="submit">Submit</button>
</form></body>
</html>
