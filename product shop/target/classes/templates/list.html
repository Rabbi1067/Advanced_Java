<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css.css}">
</head>
<body>

<h1>Product List</h1>

<a th:href="@{/product/add}" class="add-btn">+ Add Product</a>

<p th:if="${products.isEmpty()}">No product available.</p>

<table th:unless="${products.isEmpty()}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.category}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.stock}"></td>
        <td>
            <a th:href="@{/product/edit/{id}(id=${product.id})}" class="edit-btn">
                Edit
            </a>

            <a th:href="@{/product/delete/{id}(id=${product.id})}"
               class="delete-btn"
               onclick="return confirm('Are you sure you want to delete this product?')">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
