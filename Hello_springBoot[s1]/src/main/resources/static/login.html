<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#eaf2ff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{

            background:white;
            padding:35px;
            width:350px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);

        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#2563eb;
        }

        input{

            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;

        }

        button{

            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;

        }

        button:hover{

            background:#1d4ed8;

        }

        a{

            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;

        }

    </style>

</head>
<body>

<div class="card">

    <h2>Login</h2>

    <form action="dashboard.html">
        <input type="email">
        <input type="password">

        <button type="submit">Login</button>
    </form>

    <a href="index.html">Back Home</a>

</div>

</body>
</html>
