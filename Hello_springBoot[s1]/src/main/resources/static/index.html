<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }
        body{
            background:#f4f6f9;
        }
        header{
            background:#2563eb;
            color:white;
            padding:18px;
            text-align:center;
        }
        .container{
            width:80%;
            margin:80px auto;
            text-align:center;
        }
        h1{
            color:#333;
            margin-bottom:20px;
        }
        p{
            color:#555;
            margin-bottom:30px;
        }
        .btn{
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px 25px;
            border-radius:6px;
            margin:10px;
            display:inline-block;
        }
        .btn:hover{
            background:#1d4ed8;
        }
    </style>

</head>
<body>

<header>
    <h2>Employee Management System</h2>
</header>

<div class="container">

    <h1>Welcome</h1>

    <p>Simple Spring Boot Web Application</p>

    <a href="login.html">
        <button>Login</button>
    </a>
</div>

</body>
</html>
